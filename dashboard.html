<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — AssignHub</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body data-page="dashboard">

<script type="module">
  import { renderNav } from "/js/nav.js";
  import { requireAuth, getUser, formatDate, roleBadge, isOverdue } from "/js/utils.js";
  import { apiGetAllAssignments, apiGetStudentAssignments, apiGetAllUsers, apiGetMe, BASE_URL } from "/js/api.js";

  if (!requireAuth()) throw new Error("unauth");
  let user = getUser();

  // ── Self-healing: if name/role is missing, fetch /me now ──
  // (token is guaranteed in localStorage at this point)
  if (!user || !user.name || !user.role) {
    console.warn("⚠️ Incomplete user in localStorage — fetching /me to recover...");
    const meRes = await apiGetMe();
    console.log("🔄 /me recovery response:", meRes);
    if (meRes.ok) {
      const raw = meRes.data.user || meRes.data.data || meRes.data;
      const merged = {
        _id:   raw._id   || raw.id   || user?._id   || "",
        name:  raw.name  || raw.username || raw.fullName || user?.name || "",
        email: raw.email || user?.email || "",
        role:  raw.role  || raw.userRole || raw.user_role || raw.type || user?.role || "",
      };
      localStorage.setItem("user", JSON.stringify(merged));
      user = merged;
      console.log("✅ Recovered user:", user);
    } else {
      console.error("❌ /me also failed:", meRes.error);
    }
  }

  renderNav("dashboard");

  // Inject page structure
  document.body.insertAdjacentHTML("beforeend", `
    <div class="page-wrapper">
      <div class="page-header" style="display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:12px;">
        <div>
          <p style="font-family:'IBM Plex Mono',monospace;font-size:0.72rem;color:#f59e0b;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px;">Welcome back</p>
          <h1 class="page-title">${user?.name || "User"}</h1>
          <p class="page-subtitle">${user?.role?.toUpperCase()} DASHBOARD</p>
        </div>
        <div style="font-family:'IBM Plex Mono',monospace;font-size:0.72rem;color:#475569;" id="date-display"></div>
      </div>
      <div id="dashboard-content"></div>
    </div>
  `);

  document.getElementById("date-display").textContent = new Date().toLocaleDateString("en-GB", {
    weekday:"long", year:"numeric", month:"long", day:"numeric"
  });

  await renderDashboard();

  async function renderDashboard() {
    const container = document.getElementById("dashboard-content");
    if (user?.role === "student")  await renderStudent(container);
    if (user?.role === "lecturer") await renderLecturer(container);
    if (user?.role === "admin")    await renderAdmin(container);
  }

  async function renderStudent(c) {
    c.innerHTML = skeleton(3);
    const res = await apiGetStudentAssignments();
    if (!res.ok) { c.innerHTML = errCard(res.error); return; }
    const d    = res.data;
    const list = Array.isArray(d) ? d : (Array.isArray(d?.assignments) ? d.assignments : (Array.isArray(d?.data) ? d.data : []));
    const pending   = list.filter(a => !a.submitted);
    const submitted = list.filter(a => a.submitted);

    c.innerHTML = `
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:28px;">
        ${stat("Total Assigned", list.length, "📋")}
        ${stat("Pending", pending.length, "⏳", "#f59e0b")}
        ${stat("Submitted", submitted.length, "✓", "#10b981")}
      </div>
      <div class="card animate-fadeUp">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
          <h2 class="section-title">My Assignments</h2>
          <a href="/assignments/student.html" class="btn-ghost">View all →</a>
        </div>
        ${list.length === 0 ? empty("No assignments yet — check back soon") : `
          <div style="display:flex;flex-direction:column;gap:0;">
            ${list.slice(0,6).map(a => `
              <div style="padding:16px 0;border-bottom:1px solid #152038;display:flex;align-items:center;justify-content:space-between;gap:16px;">
                <div style="flex:1;min-width:0;">
                  <p style="font-weight:600;color:white;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${a.title}</p>
                  <p style="font-family:'IBM Plex Mono',monospace;font-size:0.72rem;color:#64748b;">
                    Due: ${formatDate(a.dueDate)}
                    ${isOverdue(a.dueDate) && !a.submitted ? '<span style="color:#f87171"> · overdue</span>' : ''}
                  </p>
                </div>
                ${a.submitted
                  ? `<span class="status-badge" style="background:rgba(16,185,129,0.1);color:#6ee7b7;border-color:rgba(16,185,129,0.3);">✓ Submitted</span>`
                  : `<a href="/assignments/submit.html?id=${a._id}" class="btn-primary" style="font-size:0.8rem;padding:7px 16px;white-space:nowrap;">Submit →</a>`
                }
              </div>
            `).join("")}
          </div>
        `}
      </div>`;
  }

  async function renderLecturer(c) {
    c.innerHTML = skeleton(3);
    const res = await apiGetAllAssignments();
    if (!res.ok) { c.innerHTML = errCard(res.error); return; }
    const d    = res.data;
    const list = Array.isArray(d) ? d : (Array.isArray(d?.assignments) ? d.assignments : (Array.isArray(d?.data) ? d.data : []));

    c.innerHTML = `
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:28px;">
        ${stat("Assignments", list.length, "📋")}
        ${stat("Active", list.filter(a=>!isOverdue(a.dueDate)).length, "🟢", "#10b981")}
        ${stat("Overdue", list.filter(a=>isOverdue(a.dueDate)).length, "🔴", "#f87171")}
      </div>
      <div class="card animate-fadeUp">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
          <h2 class="section-title">Recent Assignments</h2>
          <div style="display:flex;gap:8px;">
            <a href="/assignments/list.html" class="btn-ghost">View all →</a>
            <a href="/assignments/create.html" class="btn-primary" style="font-size:0.83rem;padding:7px 16px;">+ New</a>
          </div>
        </div>
        ${assignTable(list.slice(0,6))}
      </div>`;
  }

  async function renderAdmin(c) {
    c.innerHTML = skeleton(4);
    const [aRes, uRes] = await Promise.all([apiGetAllAssignments(), apiGetAllUsers()]);

    // Show API errors inline so they're visible
    if (!aRes.ok || !uRes.ok) {
      c.innerHTML = `
        <div class="card" style="border-color:rgba(248,113,113,0.3);margin-bottom:12px;">
          <p style="color:#f87171;font-family:'IBM Plex Mono',monospace;font-size:0.85rem;margin-bottom:8px;">⚠ API error — check your backend and BASE_URL in js/api.js</p>
          ${!aRes.ok ? `<p style="color:#f87171;font-size:0.78rem;font-family:'IBM Plex Mono',monospace;">Assignments: ${aRes.error}</p>` : ""}
          ${!uRes.ok ? `<p style="color:#f87171;font-size:0.78rem;font-family:'IBM Plex Mono',monospace;">Users: ${uRes.error}</p>` : ""}
        </div>`;
      return;
    }

    // Unwrap any response shape: { assignments:[...] } | { data:[...] } | [...]
    const unwrap = (res, keys) => {
      const d = res.data;
      if (Array.isArray(d)) return d;
      for (const k of keys) if (Array.isArray(d?.[k])) return d[k];
      if (Array.isArray(d?.data)) return d.data;
      return [];
    };

    const assignments = unwrap(aRes, ["assignments", "data"]);
    const users       = unwrap(uRes, ["users", "data"]);
    const students    = users.filter(u => u.role === "student");
    const lecturers   = users.filter(u => u.role === "lecturer");

    c.innerHTML = `
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:28px;">
        ${stat("Total Users", users.length, "👥")}
        ${stat("Assignments", assignments.length, "📋", "#f59e0b")}
        ${stat("Students", students.length, "🎓", "#10b981")}
        ${stat("Lecturers", lecturers.length, "🏫", "#60a5fa")}
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;" class="lg-grid">
        <div class="card animate-fadeUp">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
            <h2 class="section-title">Recent Users</h2>
            <a href="/users/list.html" class="btn-ghost">Manage →</a>
          </div>
          <div>
            ${users.slice(0,5).map(u => `
              <div style="padding:12px 0;border-bottom:1px solid #152038;display:flex;align-items:center;justify-content:space-between;gap:10px;">
                <div style="display:flex;align-items:center;gap:10px;">
                  <div style="width:32px;height:32px;border-radius:50%;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.2);display:flex;align-items:center;justify-content:center;font-weight:bold;color:#f59e0b;font-size:0.85rem;flex-shrink:0;">${u.name.charAt(0).toUpperCase()}</div>
                  <div>
                    <p style="font-size:0.88rem;font-weight:600;color:white;">${u.name}</p>
                    <p style="font-size:0.72rem;color:#64748b;font-family:'IBM Plex Mono',monospace;">${u.email}</p>
                  </div>
                </div>
                ${roleBadge(u.role)}
              </div>
            `).join("") || empty("No users")}
          </div>
        </div>
        <div class="card animate-fadeUp" style="animation-delay:0.08s;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
            <h2 class="section-title">Assignments</h2>
            <a href="/assignments/list.html" class="btn-ghost">View all →</a>
          </div>
          ${assignTable(assignments.slice(0,5))}
        </div>
      </div>`;
  }

  function stat(label, value, icon, color="#f59e0b") {
    return `<div class="card" style="display:flex;align-items:center;gap:14px;">
      <span style="font-size:2rem;">${icon}</span>
      <div>
        <p style="font-size:1.8rem;font-weight:800;color:${color};line-height:1;">${value}</p>
        <p style="font-family:'IBM Plex Mono',monospace;font-size:0.65rem;color:#64748b;text-transform:uppercase;letter-spacing:0.08em;margin-top:3px;">${label}</p>
      </div>
    </div>`;
  }

  function assignTable(items) {
    if (!items.length) return empty("No assignments");
    return items.map(a => `
      <div style="padding:12px 0;border-bottom:1px solid #152038;">
        <p style="font-weight:600;color:white;font-size:0.88rem;">${a.title}</p>
        <p style="font-family:'IBM Plex Mono',monospace;font-size:0.7rem;color:#64748b;margin-top:2px;">
          Due: ${formatDate(a.dueDate)}
          ${isOverdue(a.dueDate) ? '<span style="color:#f87171"> · overdue</span>' : '<span style="color:#6ee7b7"> · active</span>'}
        </p>
      </div>`).join("");
  }

  function skeleton(n=3) {
    return Array(n).fill(0).map((_,i) =>
      `<div class="card animate-pulse" style="animation-delay:${i*0.06}s;margin-bottom:12px;">
        <div style="height:14px;background:#152038;border-radius:4px;width:55%;margin-bottom:10px;"></div>
        <div style="height:10px;background:#152038;border-radius:4px;width:35%;"></div>
      </div>`).join("");
  }
  function errCard(m) { return `<div class="card" style="border-color:rgba(248,113,113,0.3);"><p style="color:#f87171;font-family:'IBM Plex Mono',monospace;font-size:0.85rem;">Error: ${m}</p></div>`; }
  function empty(m)   { return `<p style="text-align:center;color:#475569;font-family:'IBM Plex Mono',monospace;font-size:0.83rem;padding:32px 0;">${m}</p>`; }
</script>

<style>
  @media (max-width: 640px) { .lg-grid { grid-template-columns: 1fr !important; } }
</style>
</body>
</html>
