<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Assignment — AssignHub</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body data-page="create">

<script type="module">
  import { renderNav } from "/js/nav.js";
  import { requireAuth, showMessage } from "/js/utils.js";
  import { BASE_URL } from "/js/api.js";

  if (!requireAuth(["lecturer", "admin"])) throw new Error("unauth");
  renderNav("create");

  document.body.insertAdjacentHTML("beforeend", `
    <div class="page-wrapper">
      <!-- Nav breadcrumb -->
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:20px;font-family:'IBM Plex Mono',monospace;font-size:0.75rem;color:#475569;">
        <a href="/dashboard.html" style="color:#64748b;text-decoration:none;transition:color 0.2s;" onmouseover="this.style.color='#f59e0b'" onmouseout="this.style.color='#64748b'">← Dashboard</a>
        <span>/</span>
        <span style="color:#94a3b8;">Create Assignment</span>
      </div>

      <div class="page-header">
        <h1 class="page-title">Create Assignment</h1>
        <p class="page-subtitle">New assignment for students</p>
      </div>

      <div style="display:grid;grid-template-columns:1fr 320px;gap:20px;max-width:900px;" id="layout">
        <div>
          <div id="msg" class="hidden mb-5"></div>

          <div class="card">
            <form id="createForm" novalidate>

              <div class="form-group">
                <label class="form-label">Assignment Title *</label>
                <input id="title" type="text" class="form-input"
                  placeholder="e.g. Research Paper on Algorithms" required />
              </div>

              <div class="form-group">
                <label class="form-label">Description *</label>
                <textarea id="description" class="form-input"
                  placeholder="Detailed instructions, requirements, marking criteria…"
                  rows="5" required></textarea>
              </div>

              <div class="form-group">
                <label class="form-label">Due Date *</label>
                <input id="dueDate" type="datetime-local" class="form-input" required />
              </div>

              <!-- Attachment upload -->
              <div class="form-group">
                <label class="form-label">Attachment <span style="color:#475569;font-weight:400;">(optional — PDF brief for students)</span></label>

                <div id="attachDropZone" style="border:2px dashed #1e2e4a;border-radius:10px;padding:28px 20px;text-align:center;cursor:pointer;transition:all 0.2s;position:relative;">
                  <input type="file" id="attachFile" name="attachment" accept="application/pdf"
                    style="position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;" />
                  <div id="attachIcon" style="font-size:2rem;margin-bottom:6px;">📎</div>
                  <p id="attachLabel" style="font-weight:600;color:white;font-size:0.9rem;margin-bottom:3px;">Attach a PDF (optional)</p>
                  <p style="font-family:'IBM Plex Mono',monospace;font-size:0.7rem;color:#475569;">Click to browse or drag & drop · PDF only · max 10MB</p>
                </div>

                <!-- File preview -->
                <div id="attachPreview" style="display:none;margin-top:10px;padding:11px 14px;background:rgba(245,158,11,0.05);border:1px solid rgba(245,158,11,0.2);border-radius:8px;">
                  <div style="display:flex;align-items:center;gap:10px;">
                    <span style="font-size:1.2rem;">📄</span>
                    <div style="flex:1;min-width:0;">
                      <p id="attachName" style="font-weight:600;color:white;font-size:0.85rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></p>
                      <p id="attachSize" style="font-family:'IBM Plex Mono',monospace;font-size:0.7rem;color:#64748b;"></p>
                    </div>
                    <button type="button" id="clearAttach" style="background:none;border:none;cursor:pointer;color:#64748b;font-size:1.1rem;" title="Remove">✕</button>
                  </div>
                </div>
              </div>

              <div style="display:flex;gap:12px;margin-top:8px;">
                <button type="submit" id="submitBtn" class="btn-primary" style="flex:1;justify-content:center;padding:13px;">
                  Create Assignment
                </button>
                <a href="/assignments/list.html" class="btn-secondary">View all →</a>
              </div>
            </form>
          </div>
        </div>

        <!-- Sidebar -->
        <div>
          <div class="card" style="background:rgba(245,158,11,0.04);border-color:rgba(245,158,11,0.15);margin-bottom:14px;">
            <p style="font-family:'IBM Plex Mono',monospace;font-size:0.72rem;color:#f59e0b;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px;">Tips</p>
            <ul style="font-size:0.82rem;color:#64748b;list-style:none;display:flex;flex-direction:column;gap:8px;line-height:1.5;">
              <li>→ Set a realistic due date</li>
              <li>→ Include marking criteria in the description</li>
              <li>→ Attach a PDF brief — students can view it before submitting</li>
              <li>→ Students submit PDF files up to 10MB</li>
            </ul>
          </div>
          <div class="card">
            <p style="font-family:'IBM Plex Mono',monospace;font-size:0.72rem;color:#64748b;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px;">After Creating</p>
            <p style="font-size:0.82rem;color:#475569;line-height:1.6;">The assignment will be immediately visible to all students. They can submit PDF files before the due date.</p>
          </div>
        </div>
      </div>
    </div>
  `);

  // Min date = now
  const dueDateInput = document.getElementById("dueDate");
  const now = new Date();
  now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
  dueDateInput.min = now.toISOString().slice(0, 16);

  // ── Attachment drop zone ───────────────────────────────────
  const dropZone   = document.getElementById("attachDropZone");
  const fileInput  = document.getElementById("attachFile");

  dropZone.addEventListener("dragover", e => {
    e.preventDefault();
    dropZone.style.borderColor = "#f59e0b";
    dropZone.style.background  = "rgba(245,158,11,0.04)";
  });
  dropZone.addEventListener("dragleave", () => {
    dropZone.style.borderColor = "#1e2e4a";
    dropZone.style.background  = "";
  });
  dropZone.addEventListener("drop", e => {
    e.preventDefault();
    dropZone.style.borderColor = "#1e2e4a";
    dropZone.style.background  = "";
    if (e.dataTransfer.files[0]) {
      fileInput.files = e.dataTransfer.files;
      handleFile(e.dataTransfer.files[0]);
    }
  });

  fileInput.addEventListener("change", e => {
    if (e.target.files[0]) handleFile(e.target.files[0]);
  });

  document.getElementById("clearAttach").addEventListener("click", () => {
    fileInput.value = "";
    document.getElementById("attachPreview").style.display = "none";
    document.getElementById("attachLabel").textContent = "Attach a PDF (optional)";
    document.getElementById("attachIcon").textContent  = "📎";
    dropZone.style.borderColor = "#1e2e4a";
  });

  function handleFile(file) {
    if (file.type !== "application/pdf") {
      showMessage("Only PDF files are accepted", "error"); return;
    }
    if (file.size > 10 * 1024 * 1024) {
      showMessage("File must be under 10MB", "error"); return;
    }
    document.getElementById("attachName").textContent = file.name;
    document.getElementById("attachSize").textContent = (file.size / 1024 / 1024).toFixed(2) + " MB";
    document.getElementById("attachPreview").style.display = "block";
    document.getElementById("attachLabel").textContent = "File selected ✓";
    document.getElementById("attachIcon").textContent  = "✅";
    dropZone.style.borderColor = "rgba(16,185,129,0.4)";
  }

  // ── Form submit — must use FormData for multipart ──────────
  document.getElementById("createForm").addEventListener("submit", async e => {
    e.preventDefault();
    const btn   = document.getElementById("submitBtn");
    const title = document.getElementById("title").value.trim();
    const desc  = document.getElementById("description").value.trim();
    const due   = document.getElementById("dueDate").value;

    if (!title || !desc || !due) {
      showMessage("Title, description and due date are required", "error"); return;
    }

    btn.disabled = true; btn.textContent = "Creating…";

    // Use FormData so Multer can receive the file
    const formData = new FormData();
    formData.append("title",       title);
    formData.append("description", desc);
    formData.append("dueDate",     due);

    const attachFile = document.getElementById("attachFile").files[0];
    if (attachFile) formData.append("attachment", attachFile);

    try {
      const token = localStorage.getItem("token");
      const res   = await fetch(`${BASE_URL}/api/assignments`, {
        method:  "POST",
        headers: { Authorization: `Bearer ${token}` }, // NO Content-Type — browser sets it with boundary
        body:    formData,
      });
      const data = await res.json();

      if (res.ok && data.success) {
        showMessage("Assignment created successfully! 🎉", "success");
        document.getElementById("createForm").reset();
        document.getElementById("attachPreview").style.display = "none";
        document.getElementById("attachLabel").textContent = "Attach a PDF (optional)";
        document.getElementById("attachIcon").textContent  = "📎";
        dropZone.style.borderColor = "#1e2e4a";
      } else {
        showMessage(data.message || "Failed to create assignment", "error");
      }
    } catch (err) {
      showMessage("Network error: " + err.message, "error");
    }

    btn.disabled = false; btn.textContent = "Create Assignment";
  });
</script>

<style>
  @media (max-width: 680px) { #layout { grid-template-columns: 1fr !important; } }
</style>
</body>
</html>
